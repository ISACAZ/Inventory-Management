services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: invent
      POSTGRES_USER: invent
      POSTGRES_PASSWORD: invent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invent -d invent"]
      interval: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://invent:invent@postgres:5432/invent
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
